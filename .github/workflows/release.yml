name: Android Release (APK)

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Decode keystore
        env:
          SIGNING_KEYSTORE_BASE64: ${{ secrets.SIGNING_KEYSTORE_BASE64 }}
        run: |
          echo "$SIGNING_KEYSTORE_BASE64" | base64 --decode > ${{ github.workspace }}/release-keystore.jks

      - name: Build signed release APK
        env:
          SIGNING_STORE_FILE: ${{ github.workspace }}/release-keystore.jks
          SIGNING_STORE_PASSWORD: ${{ secrets.SIGNING_STORE_PASSWORD }}
          SIGNING_KEY_ALIAS: ${{ secrets.SIGNING_KEY_ALIAS }}
          SIGNING_KEY_PASSWORD: ${{ secrets.SIGNING_KEY_PASSWORD }}
        run: |
          chmod +x ./gradlew
          ./gradlew :app:assembleRelease

      - name: Rename APK
        run: |
          APK_PATH="$(ls -1 app/build/outputs/apk/release/*.apk | head -n 1)"
          OUT="Tracker-${{ github.ref_name }}.apk"
          cp "$APK_PATH" "$OUT"
          echo "APK_OUT=$OUT" >> "$GITHUB_ENV"

      - name: Create GitHub Release and upload APK
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ env.APK_OUT }}
